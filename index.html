<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IoT Dashboard - Nhiệt độ & Độ ẩm Realtime</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .text-huge {
            font-size: clamp(5rem, 15vw, 10rem);
            line-height: 1;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-6">

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-10 w-full max-w-6xl">

        <!-- Card Nhiệt độ -->
        <div class="bg-white border-4 border-slate-100 rounded-[3rem] p-12 shadow-2xl flex flex-col items-center justify-center transition-all duration-300 hover:border-slate-200 hover:scale-[1.02]">
            <div class="flex items-center gap-4 mb-6">
                <div class="p-3 bg-orange-50 rounded-2xl">
                    <i data-lucide="thermometer" class="w-10 h-10 text-orange-500" stroke-width="2.5"></i>
                </div>
                <span class="text-2xl font-black uppercase tracking-widest text-slate-400">Nhiệt độ</span>
            </div>

            <div class="flex items-baseline">
                <span id="temp-value" class="text-huge font-black tracking-tighter text-slate-900 tabular-nums">
                    --
                </span>
                <span class="text-5xl font-bold text-slate-300 ml-4">°C</span>
            </div>
        </div>

        <!-- Card Độ ẩm -->
        <div class="bg-white border-4 border-slate-100 rounded-[3rem] p-12 shadow-2xl flex flex-col items-center justify-center transition-all duration-300 hover:border-slate-200 hover:scale-[1.02]">
            <div class="flex items-center gap-4 mb-6">
                <div class="p-3 bg-blue-50 rounded-2xl">
                    <i data-lucide="droplets" class="w-10 h-10 text-blue-500" stroke-width="2.5"></i>
                </div>
                <span class="text-2xl font-black uppercase tracking-widest text-slate-400">Độ ẩm</span>
            </div>

            <div class="flex items-baseline">
                <span id="humidity-value" class="text-huge font-black tracking-tighter text-slate-900 tabular-nums">
                    --
                </span>
                <span class="text-5xl font-bold text-slate-300 ml-4">%</span>
            </div>
        </div>

    </div>

    <!-- Tải thư viện Era Widget -->
    <script src="https://www.unpkg.com/@eohjsc/era-widget@1.1.3/src/index.js"></script>
    <script>
        // Khởi tạo icon Lucide
        lucide.createIcons();

        // Các phần tử hiển thị
        const tempElement = document.getElementById('temp-value');
        const humiElement = document.getElementById('humidity-value');

        // Biến lưu cấu hình
        let configTemp = null;
        let configHumi = null;

        const eraWidget = new EraWidget();
        eraWidget.init({
            needRealtimeConfigs: true,
            maxRealtimeConfigsCount: 2, // Chỉ cần 2 chân cho Nhiệt độ và Độ ẩm
            
            onConfiguration: (configuration) => {
                // Giả định: 
                // Index 0 trên Dashboard Era là Nhiệt độ
                // Index 1 trên Dashboard Era là Độ ẩm
                configTemp = configuration.realtime_configs[0];
                configHumi = configuration.realtime_configs[1];
            },

            onValues: (values) => {
                // Cập nhật Nhiệt độ nếu có cấu hình
                if (configTemp && values[configTemp.id]) {
                    tempElement.innerText = values[configTemp.id].value;
                }

                // Cập nhật Độ ẩm nếu có cấu hình
                if (configHumi && values[configHumi.id]) {
                    humiElement.innerText = values[configHumi.id].value;
                }
            }
        });
    </script>
</body>
</html>
